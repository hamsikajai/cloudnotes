<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Notes</title>

  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body class="login-page">

<div class="login-container">

  <div class="login-card">

    <h1>☁️ Cloud Notes</h1>

    <p class="subtitle">
      Welcome back! Sign in to access your notes anywhere.
    </p>

    <button id="googleSignIn" class="google-btn">
      🌸 Continue with Google
    </button>

    <div class="divider">
      <span>or</span>
    </div>

    <input
      type="email"
      id="email"
      placeholder="Email">

    <input
      type="password"
      id="password"
      placeholder="Password">

    <button id="loginBtn" class="login-btn">
      Log In
    </button>

    <button id="signupBtn" class="signup-btn">
      Create Account
    </button>

  </div>

</div>

<script type="module" src="login.js"></script>

</body>
</html>
